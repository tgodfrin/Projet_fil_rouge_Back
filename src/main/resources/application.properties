# Application
spring.application.name=loc-mns-back

# Database
# Les valeurs par défaut (après :) sont utilisées en local sans Docker
# En Docker Compose, SPRING_DATASOURCE_URL/USERNAME/PASSWORD sont injectées par docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/locmns}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:locmns_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:locmns_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# update : préserve les données entre redémarrages (create recrée tout à chaque démarrage)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Server
server.port=8080